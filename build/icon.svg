<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a2348"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7df9ff"/>
      <stop offset="1" stop-color="#2ec8ff"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f7ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#9fd9ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <g opacity="0.18" stroke="#7df9ff" stroke-width="2" fill="none">
    <path d="M 0 760 L 1024 480"/>
    <path d="M 0 820 L 1024 540"/>
    <path d="M 0 880 L 1024 600"/>
  </g>

  <g transform="translate(512 512) rotate(-12) translate(-512 -512)" filter="url(#glow)">
    <rect x="312" y="208" width="96" height="608" rx="48" fill="url(#bar1)"/>
    <rect x="616" y="208" width="96" height="608" rx="48" fill="url(#bar2)"/>
  </g>

  <g transform="translate(512 512) rotate(-12) translate(-512 -512)" fill="none" stroke="url(#bracket)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 232 248 L 168 248 L 168 416"/>
    <path d="M 792 776 L 856 776 L 856 608"/>
  </g>

  <rect x="2" y="2" width="1020" height="1020" rx="223" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
