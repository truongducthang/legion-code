<svg xmlns="http://www.w3.org/2000/svg" width="320" height="96" viewBox="0 0 320 96" fill="none">
  <defs>
    <linearGradient id="ltsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0a10"/>
      <stop offset="0.55" stop-color="#10040a"/>
      <stop offset="1" stop-color="#020001"/>
    </linearGradient>
    <radialGradient id="ltsLight" cx="0.2" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#c47a4a" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ltsBar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="0.5" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="ltsBar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ltsBracket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.55" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ltsGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark squircle background -->
  <rect width="320" height="96" rx="18" fill="url(#ltsBg)"/>
  <rect width="320" height="96" rx="18" fill="url(#ltsLight)"/>
  <!-- Thin gold inner stroke for containment -->
  <rect x="0.5" y="0.5" width="319" height="95" rx="17.5" fill="none" stroke="#fcd34d" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Icon mark, ~80x80 -->
  <g transform="translate(8 8)">
    <g transform="rotate(-10 40 40)">
      <rect x="22" y="14" width="13" height="60" rx="6" fill="url(#ltsBar1)"/>
      <rect x="22" y="14" width="13" height="22" rx="6" fill="url(#ltsGloss)" opacity="0.4"/>
      <rect x="22" y="14" width="13" height="60" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.5"/>
      <rect x="42" y="14" width="13" height="60" rx="6" fill="url(#ltsBar2)"/>
      <rect x="42" y="14" width="13" height="22" rx="6" fill="url(#ltsGloss)" opacity="0.4"/>
      <rect x="42" y="14" width="13" height="60" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.5"/>
      <g fill="none" stroke="url(#ltsBracket)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 18 12 L 11 12 L 11 28"/>
        <path d="M 59 68 L 66 68 L 66 52"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="106" y="64" font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-2" fill="#fde68a">Legion</text>
</svg>
