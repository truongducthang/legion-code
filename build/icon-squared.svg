<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0a10"/>
      <stop offset="0.55" stop-color="#10040a"/>
      <stop offset="1" stop-color="#020001"/>
    </linearGradient>
    <radialGradient id="bgLight" cx="0.25" cy="0.18" r="0.8">
      <stop offset="0" stop-color="#c47a4a" stop-opacity="0.45"/>
      <stop offset="0.45" stop-color="#5a1818" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgVignette" cx="0.5" cy="1" r="0.95">
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="aura" cx="0.5" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#b45309" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c1d1d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bar1Face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd6d6"/>
      <stop offset="0.12" stop-color="#fb7185"/>
      <stop offset="0.45" stop-color="#dc2626"/>
      <stop offset="0.78" stop-color="#991b1b"/>
      <stop offset="1" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="bar2Face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4cc"/>
      <stop offset="0.12" stop-color="#fcd34d"/>
      <stop offset="0.45" stop-color="#f59e0b"/>
      <stop offset="0.78" stop-color="#b45309"/>
      <stop offset="1" stop-color="#4d2607"/>
    </linearGradient>
    <linearGradient id="edgeShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.75" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="topGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bracketGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.55" stop-color="#fcd34d" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#b45309" stop-opacity="0.7"/>
    </linearGradient>

    <filter id="strongBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>

    <clipPath id="squareClip"><rect width="1024" height="1024" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#squareClip)">
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect width="1024" height="1024" fill="url(#bgLight)"/>

    <g opacity="0.05" stroke="#fcd34d" stroke-width="1" fill="none">
      <line x1="0" y1="170" x2="1024" y2="170"/>
      <line x1="0" y1="340" x2="1024" y2="340"/>
      <line x1="0" y1="510" x2="1024" y2="510"/>
      <line x1="0" y1="680" x2="1024" y2="680"/>
      <line x1="0" y1="850" x2="1024" y2="850"/>
      <line x1="170" y1="0" x2="170" y2="1024"/>
      <line x1="340" y1="0" x2="340" y2="1024"/>
      <line x1="510" y1="0" x2="510" y2="1024"/>
      <line x1="680" y1="0" x2="680" y2="1024"/>
      <line x1="854" y1="0" x2="854" y2="1024"/>
    </g>

    <ellipse cx="512" cy="512" rx="440" ry="400" fill="url(#aura)"/>

    <g transform="rotate(-10 512 512)">
      <g filter="url(#strongBlur)" opacity="0.85">
        <rect x="332" y="820" width="80" height="60" rx="30" fill="#000"/>
        <rect x="636" y="820" width="80" height="60" rx="30" fill="#000"/>
      </g>

      <g>
        <rect x="324" y="220" width="96" height="608" rx="48" fill="#190308"/>
        <rect x="312" y="208" width="96" height="608" rx="48" fill="url(#bar1Face)"/>
        <rect x="312" y="208" width="96" height="608" rx="48" fill="url(#edgeShade)"/>
        <rect x="324" y="222" width="72" height="180" rx="36" fill="url(#topGloss)" opacity="0.55"/>
        <ellipse cx="360" cy="232" rx="42" ry="8" fill="#ffffff" opacity="0.7"/>
        <rect x="312" y="208" width="96" height="608" rx="48" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      </g>

      <g>
        <rect x="628" y="220" width="96" height="608" rx="48" fill="#1c0d02"/>
        <rect x="616" y="208" width="96" height="608" rx="48" fill="url(#bar2Face)"/>
        <rect x="616" y="208" width="96" height="608" rx="48" fill="url(#edgeShade)"/>
        <rect x="628" y="222" width="72" height="180" rx="36" fill="url(#topGloss)" opacity="0.55"/>
        <ellipse cx="664" cy="232" rx="42" ry="8" fill="#ffffff" opacity="0.7"/>
        <rect x="616" y="208" width="96" height="608" rx="48" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      </g>

      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <g stroke="#000000" stroke-opacity="0.6" stroke-width="48" transform="translate(0 10)">
          <path d="M 268 196 L 188 196 L 188 376"/>
          <path d="M 756 828 L 836 828 L 836 648"/>
        </g>
        <g stroke="url(#bracketGrad)" stroke-width="40">
          <path d="M 268 196 L 188 196 L 188 376"/>
          <path d="M 756 828 L 836 828 L 836 648"/>
        </g>
      </g>

      <g fill="#fcd34d" opacity="0.75">
        <circle cx="512" cy="430" r="6"/>
        <circle cx="512" cy="510" r="6"/>
        <circle cx="512" cy="590" r="6"/>
      </g>
    </g>

    <path d="M 0 0 L 1024 0 L 1024 360 Q 512 220 0 360 Z" fill="url(#topGloss)" opacity="0.12"/>

    <rect width="1024" height="1024" fill="url(#bgVignette)"/>
  </g>

  <rect x="3" y="3" width="1018" height="1018" rx="0" fill="none" stroke="#fcd34d" stroke-opacity="0.18" stroke-width="2"/>
  <rect x="7" y="7" width="1010" height="1010" rx="0" fill="none" stroke="#000000" stroke-opacity="0.6" stroke-width="2"/>
</svg>
