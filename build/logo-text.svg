<svg xmlns="http://www.w3.org/2000/svg" width="440" height="96" viewBox="0 0 440 96" fill="none">
  <defs>
    <linearGradient id="ltBar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="0.5" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="ltBar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ltBracket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.55" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="ltGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark, ~80x80, centered vertically at y=8..88 -->
  <g transform="translate(8 8)">
    <g transform="rotate(-10 40 40)">
      <!-- Crimson bar -->
      <rect x="22" y="14" width="13" height="60" rx="6" fill="url(#ltBar1)"/>
      <rect x="22" y="14" width="13" height="22" rx="6" fill="url(#ltGloss)" opacity="0.4"/>
      <rect x="22" y="14" width="13" height="60" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.5"/>
      <!-- Gold bar -->
      <rect x="42" y="14" width="13" height="60" rx="6" fill="url(#ltBar2)"/>
      <rect x="42" y="14" width="13" height="22" rx="6" fill="url(#ltGloss)" opacity="0.4"/>
      <rect x="42" y="14" width="13" height="60" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.5"/>
      <!-- Brackets -->
      <g fill="none" stroke="url(#ltBracket)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 18 12 L 11 12 L 11 28"/>
        <path d="M 59 68 L 66 68 L 66 52"/>
      </g>
    </g>
  </g>

  <!-- Wordmark "Legion" — solid bone for max legibility at small sizes -->
  <text x="106" y="64" font-family="system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-2" fill="#fde68a">Legion</text>
</svg>
